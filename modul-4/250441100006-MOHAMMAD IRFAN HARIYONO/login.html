<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Page - Online Course</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'brand-dark': '#3852B4',
            'brand-mid': '#5E7AC4',
            'brand-gold': '#F3BE7A',
            'brand-orange': '#F08D39',
          },
          fontFamily: {
            poppins: ['Poppins', 'sans-serif'],
          },
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
    }

    input::placeholder {
      color: #5E7AC4;
      font-weight: 500;
      text-align: center;
    }
  </style>
</head>

<body class="font-poppins h-screen overflow-hidden">

  <div class="flex h-screen">

    <div class="w-1/2 bg-brand-mid flex items-center justify-center p-10">
      <div class=" rounded-xl p-8 max-w-md w-full">
        <h2 class="text-4xl font-bold text-white leading-tight mb-5">Hello Prospective Students</h2>
        <img src="UTS/gambar_login page.png" alt="E-Learning" class="w-full max-w-xs mx-auto block mb-5 rounded-lg">
        <p class="text-white/90 text-sm leading-relaxed">
          Unlock your professional potential. Learn from industry leaders and stay ahead of the competition.
        </p>
      </div>
    </div>

    <div id="black" class="w-1/2 bg-[#F0F4FF] flex items-center justify-center p-10">
      <div class="w-full max-w-sm">
        <h1 id="dark" class="text-center text-xl font-bold text-gray-700 tracking-widest mb-1">LOGIN PAGE</h1>
        <p class="text-center text-xs text-gray-400 mb-7">Masukkan Username dan Password Anda</p>

        <input id="email" type="email" placeholder="Email Addres"
          class="w-full px-5 py-3.5 mb-3.5 border border-blue-200 rounded-xl bg-white text-center text-sm text-brand-dark font-medium outline-none focus:border-brand-dark focus:ring-2 focus:ring-brand-dark/20 transition">


        <input id="password" type="password" placeholder="Password"
          class="w-full px-5 py-3.5 mb-4 border border-blue-200 rounded-xl bg-white text-center text-sm text-brand-dark font-medium outline-none focus:border-brand-dark focus:ring-2 focus:ring-brand-dark/20 transition">
        <div>
          <button id="btnLogin" onclick="handleLogin()"
            class="w-full py-3.5 bg-brand-dark hover:bg-brand-mid text-white font-semibold text-sm rounded-xl transition mb-4">
            Login
          </button>
        </div>
        <p id="errorMsg" class="text-red-500 text-xs text-center -mt-2 mb-2 hidden"></p>

        <div class="flex items-center gap-3 mb-4">
          <hr class="flex-1 border-gray-300">
          <span class="text-xs text-gray-400 whitespace-nowrap">Or Login With</span>
          <hr class="flex-1 border-gray-300">
        </div>
        <button
          class="w-full py-3 bg-white border border-gray-200 rounded-xl flex items-center justify-center gap-3 hover:shadow-md transition text-sm font-medium text-gray-700">
          <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google Icon" class="w-5 h-5">
          Sign in with Account Google
        </button>
        <br>
        <button id="btnToggle"
          class="w-full py-3 bg-white border border-gray-200 rounded-xl flex items-center justify-center gap-3 hover:shadow-md transition text-sm font-medium text-gray-800"
          onclick="toggleDarkMode()">
          Light Mode
        </button>

      </div>
    </div>

  </div>
  <script src="script/login.js"></script>
</body>

</html>
